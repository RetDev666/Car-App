{% extends "base.html" %}

{% block title %}Журнал палива - Car Manager{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Журнал палива</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addFuelLogModal">
            <i class="fas fa-plus me-2"></i>Додати заправку
        </button>
    </div>
</div>

<div class="card shadow mb-4">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered" id="fuelLogTable">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Авто</th>
                        <th>Кількість (л)</th>
                        <th>Ціна за літр</th>
                        <th>Загальна сума</th>
                        <th>Пробіг</th>
                        <th>Витрата л/100км</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/fuel_log.js') }}"></script>
{% endblock %}
