<!-- Add Service Modal -->
<div class="modal fade" id="addServiceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Додати автосервіс</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addServiceForm">
                    <div class="mb-3">
                        <label for="serviceName" class="form-label">Назва сервісу</label>
                        <input type="text" class="form-control" id="serviceName" required>
                    </div>
                    <div class="mb-3">
                        <label for="serviceAddress" class="form-label">Адреса</label>
                        <input type="text" class="form-control" id="serviceAddress" required>
                    </div>
                    <div class="mb-3">
                        <label for="servicePhone" class="form-label">Телефон</label>
                        <input type="tel" class="form-control" id="servicePhone" required>
                    </div>
                    <div class="mb-3">
                        <label for="serviceRating" class="form-label">Рейтинг (1-5)</label>
                        <select class="form-control" id="serviceRating" required>
                            <option value="1">1 зірка</option>
                            <option value="2">2 зірки</option>
                            <option value="3">3 зірки</option>
                            <option value="4">4 зірки</option>
                            <option value="5">5 зірок</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="serviceDescription" class="form-label">Опис послуг</label>
                        <textarea class="form-control" id="serviceDescription" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                <button type="button" class="btn btn-primary" onclick="addService()">Додати</button>
            </div>
        </div>
    </div>
</div>
