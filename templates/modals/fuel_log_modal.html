<!-- Add Fuel Log Modal -->
<div class="modal fade" id="addFuelLogModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Додати заправку</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addFuelLogForm">
                    <div class="mb-3">
                        <label for="fuelVehicle" class="form-label">Авто</label>
                        <select class="form-control" id="fuelVehicle" required>
                            <option value="">Оберіть авто</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="fuelDate" class="form-label">Дата</label>
                        <input type="date" class="form-control" id="fuelDate" required>
                    </div>
                    <div class="mb-3">
                        <label for="fuelAmount" class="form-label">Кількість палива (л)</label>
                        <input type="number" class="form-control" id="fuelAmount" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="fuelPrice" class="form-label">Ціна за літр (₴)</label>
                        <input type="number" class="form-control" id="fuelPrice" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="fuelMileage" class="form-label">Пробіг (км)</label>
                        <input type="number" class="form-control" id="fuelMileage" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                <button type="button" class="btn btn-primary" onclick="addFuelLog()">Додати</button>
            </div>
        </div>
    </div>
</div>
